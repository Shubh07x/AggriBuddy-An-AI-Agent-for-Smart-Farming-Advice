name: AggriBuddy CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run Unit Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          IBM_API_KEY: ${{ secrets.IBM_API_KEY }}
          WATSONX_PROJECT_ID: ${{ secrets.WATSONX_PROJECT_ID }}
          WATSONX_URL: https://us-south.ml.cloud.ibm.com
        run: |
          pytest test_agent.py -v --tb=short

      - name: Check code structure
        run: |
          echo "✅ agent.py exists"        && test -f agent.py
          echo "✅ rag_pipeline.py exists" && test -f rag_pipeline.py
          echo "✅ requirements.txt exists" && test -f requirements.txt
          echo "✅ README.md exists"        && test -f README.md
